name: Westlake
description: >-
  Westlake Corporation is a global Fortune 500 manufacturer and supplier of materials
  and innovative products that enhance life every day. The company produces chemical
  materials and building products across multiple sectors including packaging,
  healthcare, automotive, consumer goods, and construction. Westlake operates through
  two primary segments: Performance and Essential Materials (PEM) and Housing and
  Infrastructure Products (HIP), with net sales of approximately $11 billion annually.
