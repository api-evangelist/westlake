  - type: Features
    data:
      - name: Performance and Essential Materials
        description: >-
          Chemical segment producing ethylene, polyethylene, PVC, chlor-alkali,
          epoxy resins, and related materials for industrial applications.
      - name: Housing and Infrastructure Products
        description: >-
          Building products segment manufacturing PVC pipe, vinyl siding, windows,
          doors, and related infrastructure materials.
      - name: Global Manufacturing
        description: >-
          Manufacturing footprint spanning North America, Europe, and Asia with
          approximately 15,000 employees and multiple production facilities.
      - name: Recycled Materials
        description: >-
          Circular economy initiatives producing recycled plastic materials and
          sustainable chemical feedstocks.
      - name: Specialty Compounds
        description: >-
          Custom compounding and specialty formulations for Dimex, Global Compounds,
          and other specialty product lines.
  - type: UseCases
    data:
      - name: Industrial Packaging
        description: >-
          Polyethylene and PVC resin supply for rigid and flexible packaging
          applications across consumer goods and industrial markets.
      - name: Construction Infrastructure
        description: >-
          PVC pipe and fittings systems for water, wastewater, and industrial
          piping applications in residential and commercial projects.
      - name: Vinyl Building Envelope
        description: >-
          Vinyl siding, windows, and trim products for energy-efficient residential
          building envelopes and renovation projects.
      - name: Chemical Synthesis
        description: >-
          Chlor-alkali and caustic soda products as inputs for chemical synthesis,
          water treatment, and industrial process chemistry.
  - type: Integrations
    data:
      - name: SAP ERP
        description: >-
          Enterprise resource planning integration for supply chain, procurement,
          and financial management across global operations.
      - name: Microsoft Azure
        description: >-
          Cloud infrastructure services supporting digital transformation and
          enterprise technology initiatives.
      - name: Microsoft Power BI
        description: >-
          Business intelligence and analytics platform for operational reporting
          and financial performance monitoring.
      - name: EDI Connectivity
        description: >-
          Electronic Data Interchange integration with trading partners for
          order management and supply chain transactions.
